<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catat Sampah - EcoTrace</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="area-navigasi">
        <div class="pembungkus">
            <a href="index.html" class="identitas-brand">Eco<span>Trace</span></a>
            <a href="index.html" style="text-decoration:none; color:var(--hijau-cerah); font-weight:600;">← Kembali</a>
        </div>
    </nav>

    <div class="pembungkus-kecil">
        <div class="wadah-form">
            <h2 style="font-family: 'Plus Jakarta Sans'; margin-bottom: 5px;">Input Log Sampah</h2>
            <p style="color: var(--abu-teks); font-size: 14px; margin-bottom: 25px;">Masukkan data setoran sampah kelas.</p>
            
            <form id="formEntry">
                <div class="grup-isian">
                    <label>Pilih Unit Kelas</label>
                    <select id="pilihan_kelas" required>
                        <option value="">-- Pilih Kelas --</option>
                        <option value="X TSM 1">X TSM 1</option>
                    <option value="X TSM 2">X TSM 2</option>
                    <option value="X TSM 3">X TSM 3</option>
                    <option value="X TSM 4">X TSM 4</option>
                    <option value="X TSM 5">X TSM 5</option>
                    <option value="X TSM 6">X TSM 6</option>
                    <option value="XI TSM 1">XI TSM 1</option>
                    <option value="XI TSM 2">XI TSM 2</option>
                    <option value="XI TSM 3">XI TSM 3</option>
                    <option value="XI TSM 4">XI TSM 4</option>
                    <option value="XI TSM 5">XI TSM 5</option>
                    <option value="XI TSM 6">XI TSM 6</option>
                    <option value="XII TSM 1">XII TSM 1</option>
                    <option value="XII TSM 2">XII TSM 2</option>
                    <option value="XII TSM 3">XII TSM 3</option>
                    <option value="XII TSM 4">XII TSM 4</option>
                    <option value="XII TSM 5">XII TSM 5</option>
                    <option value="XII TSM 6">XII TSM 6</option>
                    <option value="X TKR 1">X TKR 1</option>
                    <option value="X TKR 2">X TKR 2</option>
                    <option value="X TKR 3">X TKR 3</option>
                    <option value="X TKR 4">X TKR 4</option>
                    <option value="X TKR 5">X TKR 5</option>
                    <option value="X TKR 6">X TKR 6</option>
                    <option value="X TKR 7">X TKR 7</option>
                    <option value="X TKR 8">X TKR 8</option>
                    <option value="XI TKR 1">XI TKR 1</option>
                    <option value="XI TKR 2">XI TKR 2</option>
                    <option value="XI TKR 3">XI TKR 3</option>
                    <option value="XI TKR 4">XI TKR 4</option>
                    <option value="XI TKR 5">XI TKR 5</option>
                    <option value="XI TKR 6">XI TKR 6</option>
                    <option value="XII TKR 1">XII TKR 1</option>
                    <option value="XII TKR 2">XII TKR 2</option>
                    <option value="XII TKR 3">XII TKR 3</option>
                    <option value="XII TKR 4">XII TKR 4</option>
                    <option value="XII TKR 5">XII TKR 5</option>
                    <option value="X MP 1">X MP 1</option>
                    <option value="X MP 2">X MP 2</option>
                    <option value="X MP 3">X MP 3</option>
                    <option value="XI MP 1">XI MP 1</option>
                    <option value="XI MP 2">XI MP 2</option>
                    <option value="XI MP 3">XI MP 3</option>
                    <option value="XII MP 1">XII MP 1</option>
                    <option value="XII MP 2">XII MP 2</option>
                    <option value="XII MP 3">XII MP 3</option>
                    <option value="X AKL 1">X AKL 1</option>
                    <option value="X AKL 2">X AKL 2</option>                    
                    <option value="XI AKL 1">XI AKL 1</option>
                    <option value="XI AKL 2">XI AKL 2</option>
                    <option value="XII AKL 1">XII AKL 1</option>
                    <option value="XII AKL 2">XII AKL 2</option>
                    </select>
                </div>

                <div class="grup-isian">
                    <label>Kategori Sampah</label>
                    <select id="kategori_sampah" required>
                        <option value="">-- Pilih Jenis --</option>
                        <option value="Plastik">Plastik (Botol/Gelas)</option>
                        <option value="Kertas">Kertas/Karton</option>
                        <option value="Logam">Logam/Kaleng</option>
                        <option value="Elektronik">E-Waste (Baterai/Kabel)</option>
                        <option value="Organik">Sampah Basah/Daun</option>
                    </select>
                </div>

                <div class="grup-isian">
                    <label>Berat (Kilogram)</label>
                    <input type="number" step="0.1" id="input_berat" required>
                    <div id="preview-skor" style="margin-top: 10px; font-weight: 700; color: var(--hijau-cerah); font-size: 14px;">
                        Skor: +0
                    </div>
                </div>

                <button type="submit" class="tombol-kirim">Simpan ke Klasemen</button>
            </form>
        </div>

        <div style="margin-top: 20px; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--garis-border);">
            <h4 style="font-size: 13px; margin-bottom: 10px;">📋 Info Poin/Kg:</h4>
            <ul style="font-size: 12px; list-style: none; padding: 0; color: var(--abu-teks);">
                <li>⚡ Elektronik: 75 Poin | 🥤 Plastik: 35 Poin</li>
                <li>🥫 Logam: 45 Poin | 📦 Kertas: 25 Poin</li>
                <li>🍂 Organik: 15 Poin</li>
            </ul>
        </div>
    </div>
    
 <footer class="bagian-bawah">
        <p>&copy; 2026 <strong>Storm Riders Project</strong> - EcoTrace System v1.0</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
